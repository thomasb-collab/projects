<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilses Födelsedagskalas 🎈</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fff0f8;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* Confetti background dots */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, #ff8fab44 2px, transparent 2px),
      radial-gradient(circle, #ffd16644 2px, transparent 2px),
      radial-gradient(circle, #9b5ea244 2px, transparent 2px);
    background-size: 60px 60px, 90px 90px, 75px 75px;
    background-position: 0 0, 30px 30px, 15px 45px;
    z-index: 0;
    pointer-events: none;
  }

  .page { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; }

  /* ── Invitation card ── */
  .card {
    background: #fff9f0;
    border: 3px solid #ff8fab;
    border-radius: 28px;
    padding: 0 0 2rem;
    text-align: center;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(255,77,141,0.15);
    margin-bottom: 2rem;
  }

  .rainbow-bar {
    height: 10px;
    background: repeating-linear-gradient(
      90deg,
      #ff8fab 0 20%, #ffd166 20% 40%,
      #9b5ea2 40% 60%, #4fc3f7 60% 80%,
      #ff8fab 80% 100%
    );
  }

  .card-inner { padding: 2.2rem 2rem 0; }

  .balloons { font-size: 2.2rem; letter-spacing: 10px; margin-bottom: 0.6rem; }

  .invite-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    color: #c97bb5;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 0.15rem;
  }

  .name {
    font-family: 'Fredoka One', cursive;
    font-size: 4rem;
    color: #ff4d8d;
    line-height: 1;
    margin: 0.1rem 0 0.3rem;
  }

  .occasion {
    font-size: 1.25rem;
    color: #9b5ea2;
    font-weight: 800;
    margin-bottom: 2rem;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.8rem;
    margin: 0 2rem 2rem;
  }

  .info-box {
    background: #fff0f6;
    border-radius: 16px;
    padding: 0.9rem 0.4rem;
    border: 1.5px solid #ffc8d8;
  }

  .info-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }

  .info-label {
    font-size: 0.65rem;
    color: #c97bb5;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }

  .info-value {
    font-size: 0.9rem;
    color: #6b2d8b;
    font-weight: 800;
    margin-top: 0.2rem;
    line-height: 1.3;
  }

  .tagline {
    font-size: 1rem;
    color: #b06ab3;
    font-style: italic;
    padding: 0 2rem;
  }

  /* ── RSVP form ── */
  .rsvp-card {
    background: #fff;
    border: 2px solid #ffc8d8;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: 0 4px 20px rgba(255,77,141,0.1);
  }

  .rsvp-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: #ff4d8d;
    text-align: center;
    margin-bottom: 0.25rem;
  }

  .rsvp-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #b06ab3;
    margin-bottom: 1.8rem;
  }

  .field { margin-bottom: 1.2rem; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    color: #9b5ea2;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.4rem;
  }

  input[type="text"],
  input[type="email"],
  textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid #ffc8d8;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: #4a1b6e;
    background: #fff9fc;
    transition: border-color 0.2s;
    outline: none;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  textarea:focus {
    border-color: #ff8fab;
    background: #fff;
  }

  textarea { resize: vertical; min-height: 80px; }

  .radio-group {
    display: flex;
    gap: 0.8rem;
  }

  .radio-label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.65rem 0.5rem;
    border: 2px solid #ffc8d8;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 700;
    color: #9b5ea2;
    transition: all 0.2s;
    background: #fff9fc;
    text-transform: none;
    letter-spacing: 0;
  }

  .radio-label input { display: none; }

  .radio-label:has(input:checked) {
    background: #ff8fab;
    border-color: #ff4d8d;
    color: #fff;
  }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #ff4d8d, #c947a8);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 0.5rem;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(255,77,141,0.35);
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,77,141,0.45);
  }

  .submit-btn:active { transform: translateY(0); }

  /* Success message */
  .success {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
  }

  .success-icon { font-size: 3.5rem; margin-bottom: 0.5rem; }

  .success-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #ff4d8d;
    margin-bottom: 0.5rem;
  }

  .success-text { color: #9b5ea2; font-size: 1rem; }

  /* Formspree notice */
  .setup-notice {
    background: #fff9e6;
    border: 1.5px dashed #ffd166;
    border-radius: 12px;
    padding: 0.8rem 1rem;
    font-size: 0.82rem;
    color: #8a6800;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .setup-notice strong { color: #664d00; }

  @media (max-width: 420px) {
    .name { font-size: 3rem; }
    .info-grid { grid-template-columns: 1fr; gap: 0.6rem; margin: 0 1rem 1.5rem; }
    .card-inner { padding: 1.5rem 1rem 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Inbjudningskort -->
  <div class="card">
    <div class="rainbow-bar"></div>
    <div class="card-inner">
      <div class="balloons">🎈🎀🎈</div>
      <div class="invite-label">Du är inbjuden till</div>
      <div class="name">Ilses</div>
      <div class="occasion">Födelsedagskalas! 🎂</div>
    </div>
    <div class="info-grid">
      <div class="info-box">
        <div class="info-icon">📅</div>
        <div class="info-label">När</div>
        <div class="info-value">12 april</div>
      </div>
      <div class="info-box">
        <div class="info-icon">⏰</div>
        <div class="info-label">Tid</div>
        <div class="info-value">kl. 14–16</div>
      </div>
      <div class="info-box">
        <div class="info-icon">📍</div>
        <div class="info-label">Plats</div>
        <div class="info-value">Klockarskolan gym</div>
      </div>
    </div>
    <div class="tagline">Vi hoppas så mycket att du kan komma! 🌟</div>
  </div>

  <!-- OSA-formulär -->
  <div class="rsvp-card">
    <div class="rsvp-title">🎉 OSA</div>
    <div class="rsvp-subtitle">Vänligen svara senast <strong>5 april</strong></div>

    <!-- ⚠️ INSTRUKTION: Byt ut "YOUR_FORM_ID" nedan mot din Formspree-id.
         Gå till formspree.io, skapa ett konto och ett nytt formulär, 
         du får då en action-länk som ser ut som: https://formspree.io/f/abcdefgh -->


    <form id="rsvp-form" action="https://formspree.io/f/xaqlelaz" method="POST">
      <div class="field">
        <label for="name">Ditt namn</label>
        <input type="text" id="name" name="name" placeholder="Förnamn Efternamn" required>
      </div>

      <div class="field">
        <label for="email">E-post (för bekräftelse)</label>
        <input type="email" id="email" name="email" placeholder="din@epost.se">
      </div>

      <div class="field">
        <label>Kommer du?</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="coming" value="Ja, jag kommer!" required>
            🎉 Ja, jag kommer!
          </label>
          <label class="radio-label">
            <input type="radio" name="coming" value="Tyvärr kan jag inte komma">
            😢 Kan tyvärr inte
          </label>
        </div>
      </div>

      <div class="field">
        <label for="allergies">Allergier eller specialkost</label>
        <textarea id="allergies" name="allergies" placeholder="Lämna blankt om inga allergier..."></textarea>
      </div>

      <input type="hidden" name="_subject" value="Ny OSA till Ilses kalas! 🎂">
      <input type="hidden" name="_next" value="">

      <button type="submit" class="submit-btn">Skicka OSA 🎈</button>
    </form>

    <div class="success" id="success-msg">
      <div class="success-icon">🥳</div>
      <div class="success-title">Tack för din anmälan!</div>
      <div class="success-text">Vi ser fram emot att träffa dig på kalaset!</div>
    </div>
  </div>

</div>

<script>
  const form = document.getElementById('rsvp-form');
  const success = document.getElementById('success-msg');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    // Om Formspree inte är konfigurerat, visa ändå tack-meddelandet (för testning)
    if (form.action.includes('YOUR_FORM_ID')) {
      form.style.display = 'none';
      success.style.display = 'block';
      return;
    }

    const data = new FormData(form);
    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        success.style.display = 'block';
      } else {
        alert('Något gick fel, försök igen!');
      }
    } catch {
      alert('Kunde inte skicka, kontrollera din internetanslutning.');
    }
  });
</script>
</body>
</html>
